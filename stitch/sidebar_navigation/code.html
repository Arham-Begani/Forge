<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forge - Sidebar Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=JetBrains+Mono:wght@100..800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#C07A3A",
                        "background-light": "#FAF9F6",
                        "background-dark": "#111110",
                        "sidebar-light": "#F4F2ED",
                        "sidebar-dark": "#0D0D0C",
                        "border-light": "#E8E4DC",
                        "border-dark": "#2A2A28",
                        "text-primary-light": "#2C2B29",
                        "text-primary-dark": "#EDEDEC",
                        "text-secondary-light": "#787672",
                        "text-secondary-dark": "#858580",
                    },
                    fontFamily: {
                        "sans": ["DM Sans", "Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    backgroundImage: {
                        'noise': "url('https://grainy-gradients.vercel.app/noise.svg')",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(120, 118, 114, 0.2); 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(120, 118, 114, 0.4); 
        }
        
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex font-sans antialiased text-text-primary-light dark:text-text-primary-dark selection:bg-primary/20 selection:text-primary relative">
<!-- Noise Texture Overlay -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-[0.03] bg-noise mix-blend-overlay"></div>
<!-- Main Sidebar Container -->
<aside class="relative z-10 w-[252px] h-screen flex flex-col border-r border-border-light dark:border-border-dark bg-sidebar-light/80 dark:bg-sidebar-dark/80 glass-panel">
<!-- Header Section -->
<div class="h-14 px-4 flex items-center justify-between border-b border-border-light dark:border-border-dark shrink-0">
<div class="flex items-center gap-2">
<!-- Hexagon Logo -->
<div class="text-primary flex items-center justify-center">
<span class="material-symbols-outlined" style="font-size: 24px; font-variation-settings: 'FILL' 1;">hexagon</span>
</div>
<h1 class="font-bold text-base tracking-tight text-text-primary-light dark:text-text-primary-dark">Forge</h1>
</div>
<!-- Theme Toggle -->
<button class="p-1.5 rounded-md text-text-secondary-light dark:text-text-secondary-dark hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">light_mode</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="flex-1 overflow-y-auto py-4 px-3 flex flex-col gap-6">
<!-- New Venture Button -->
<button class="group flex items-center justify-center w-full h-8 gap-2 rounded-lg border border-border-light dark:border-border-dark bg-transparent hover:bg-white/50 dark:hover:bg-white/5 hover:border-primary/30 transition-all duration-200">
<span class="material-symbols-outlined text-text-secondary-light dark:text-text-secondary-dark group-hover:text-primary transition-colors" style="font-size: 16px;">add</span>
<span class="text-xs font-medium text-text-primary-light dark:text-text-primary-dark">New Venture</span>
</button>
<!-- Ventures Tree -->
<div class="flex flex-col gap-1">
<p class="px-2 text-[10px] font-bold uppercase tracking-wider text-text-secondary-light dark:text-text-secondary-dark opacity-60 mb-1">Ventures</p>
<!-- Venture Item 1 (Active/Expanded) -->
<div class="flex flex-col">
<!-- Parent -->
<div class="group flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer">
<span class="material-symbols-outlined text-text-secondary-light dark:text-text-secondary-dark transition-transform duration-200" style="font-size: 16px;">expand_more</span>
<span class="flex-1 text-xs font-bold text-text-primary-light dark:text-text-primary-dark truncate">Project: Helios</span>
<span class="text-[10px] text-text-secondary-light dark:text-text-secondary-dark">Oct 24</span>
</div>
<!-- Children Container -->
<div class="relative pl-[11px] flex flex-col mt-0.5 ml-2 border-l border-border-light dark:border-border-dark gap-0.5">
<!-- Child 1: Full Launch (Active State) -->
<div class="relative flex items-center gap-2 px-2 py-1.5 rounded-md bg-white dark:bg-white/5 shadow-sm border border-border-light/50 dark:border-border-dark/50 cursor-pointer group">
<!-- Active Indicator Bar -->
<div class="absolute left-0 top-1.5 bottom-1.5 w-[3px] bg-primary rounded-r-full"></div>
<span class="material-symbols-outlined text-primary" style="font-size: 16px; font-variation-settings: 'FILL' 1;">rocket_launch</span>
<span class="flex-1 text-xs font-medium text-text-primary-light dark:text-text-primary-dark">Full Launch</span>
<!-- Status Badge -->
<div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
</div>
<!-- Child 2: Research -->
<div class="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-text-secondary-light dark:text-text-secondary-dark hover:text-text-primary-light dark:hover:text-text-primary-dark transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">search</span>
<span class="flex-1 text-xs font-medium">Research</span>
</div>
<!-- Child 3: Branding -->
<div class="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-text-secondary-light dark:text-text-secondary-dark hover:text-text-primary-light dark:hover:text-text-primary-dark transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">palette</span>
<span class="flex-1 text-xs font-medium">Branding</span>
<span class="px-1.5 py-0.5 rounded-full bg-border-light dark:bg-border-dark text-[9px] font-bold">2</span>
</div>
<!-- Child 4: Marketing -->
<div class="flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer text-text-secondary-light dark:text-text-secondary-dark hover:text-text-primary-light dark:hover:text-text-primary-dark transition-colors">
<span class="material-symbols-outlined" style="font-size: 16px;">campaign</span>
<span class="flex-1 text-xs font-medium">Marketing</span>
</div>
</div>
</div>
<!-- Venture Item 2 (Collapsed) -->
<div class="flex flex-col mt-2">
<!-- Parent -->
<div class="group flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-text-secondary-light dark:text-text-secondary-dark -rotate-90 transition-transform duration-200" style="font-size: 16px;">expand_more</span>
<span class="flex-1 text-xs font-bold text-text-primary-light dark:text-text-primary-dark truncate">Project: Aether</span>
<span class="text-[10px] text-text-secondary-light dark:text-text-secondary-dark">Sep 12</span>
</div>
</div>
<!-- Venture Item 3 (Collapsed) -->
<div class="flex flex-col">
<!-- Parent -->
<div class="group flex items-center gap-2 px-2 py-1.5 rounded-md hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer opacity-70 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-text-secondary-light dark:text-text-secondary-dark -rotate-90 transition-transform duration-200" style="font-size: 16px;">expand_more</span>
<span class="flex-1 text-xs font-bold text-text-primary-light dark:text-text-primary-dark truncate">Project: Borealis</span>
<span class="text-[10px] text-text-secondary-light dark:text-text-secondary-dark">Aug 08</span>
</div>
</div>
</div>
</div>
<!-- Footer Section -->
<div class="p-3 border-t border-border-light dark:border-border-dark bg-sidebar-light dark:bg-sidebar-dark shrink-0">
<div class="flex items-center gap-3 px-2 py-2 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer transition-colors group">

<div class="relative w-8 h-8 rounded-full overflow-hidden border border-border-light dark:border-border-dark group-hover:border-primary/50 transition-colors">
<img alt="User profile picture showing a smiling man" class="w-full h-full object-cover" data-alt="User profile picture showing a smiling man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAp3hENNMEsSfQotlFR8-aU60n830tlsjtKuenNu8NwTsQhQP_wrkdLdRnuAnbH-IUuJttEdhhBp9lsI0VYS5ZVWOtmOM4EtiDStvW8wvw86d_2lpb_HiKKKYWLfXczM8NblYR_Daem6dKFli0pYucUdBu5qeE6uUX_uO1QQp897SCc7ODX0Aoym7Sy-y7J8Sx3gQocNtnAeY31gBhOj4eq0L6KhXyCICSwVAdbRql2f5-6G4HJNlNYGlTOcPAy3vTIXqfqZsH70A"/>
</div>
<!-- User Info -->
<div class="flex flex-col flex-1 min-w-0">
<span class="text-xs font-semibold text-text-primary-light dark:text-text-primary-dark truncate">Alex Founder</span>
<span class="text-[10px] font-medium text-primary truncate">Pro Plan</span>
</div>
<!-- Settings Icon -->
<span class="material-symbols-outlined text-text-secondary-light dark:text-text-secondary-dark group-hover:text-text-primary-light dark:group-hover:text-text-primary-dark transition-colors" style="font-size: 18px;">settings</span>
</div>
</div>
</aside>
<!-- Main Content Placeholder (Just to show sidebar context) -->
<main class="flex-1 p-8 opacity-40 pointer-events-none hidden md:block">
<div class="max-w-4xl mx-auto h-full rounded-2xl border border-dashed border-border-light dark:border-border-dark flex items-center justify-center">
<span class="text-text-secondary-light dark:text-text-secondary-dark font-sans text-sm">Main Content Area</span>
</div>
</main>
</body></html>
