<script>
        // Simple script to toggle dark mode for demonstration
        const themeToggleBtn = document.querySelector('button .material-symbols-outlined:contains("light_mode")').parentElement;
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const icon = themeToggleBtn.querySelector('.material-symbols-outlined');
            icon.textContent = icon.textContent === 'light_mode' ? 'dark_mode' : 'light_mode';
        });
        
        // Helper for contains text selector simulation
        Element.prototype.contains = function(text) {
             return this.textContent.includes(text);
        };
    </script>
